task: 'Integrate graphify_repo() into ContextBudget class. The child should read agent/context_budget.py
  and add a method that builds a knowledge graph over cached/read files. The method
  should accept a list of file paths, compute their hashes and content summaries,
  and output a graph structure where nodes are files and edges represent read relationships.
  Output should be written to logs/STEP-10-A-graph.yaml.

  **STEP-BY-STEP INSTRUCTIONS:**

  1. Read agent/context_budget.py completely 2. Implement graphify_repo() method in
  ContextBudget class 3. The method should: - Accept list of file paths as input -
  For each file: compute SHA256 hash using self.file_hash() - For each file: read
  content and compute summary (first 200 chars) - Build graph: nodes = files, edges
  = read relationships - Return graph dict with format: { "nodes": [ {"path": str,
  "hash": str, "summary": str, "tokens": int} ], "edges": [ {"from": str, "to": str,
  "relationship": "read"} ] } 4. Write output to logs/STEP-10-A-graph.yaml in YAML
  format 5. Return the graph dict

  **OUTPUT FORMAT:** Write YAML to logs/STEP-10-A-graph.yaml: ```yaml nodes: - path:
  "agent/context_budget.py" hash: "abc123..." summary: "..." tokens: 450 edges: -
  from: "agent/context_budget.py" to: "agent/context_budget.py" relationship: "read"
  ```

  '
