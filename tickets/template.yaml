---
# Fractal Claws — Ticket Template v1.1
# Copy this file, fill all fields, save to tickets/open/<TICKET_ID>.yaml
# Do not leave any field as null when spawning a child.

ticket_id: ""           # e.g. TASK-001  (set by parent at write time)
version: "1.1"
status: open            # open | in_progress | closed | failed | escalated

created_at: ""          # ISO 8601  e.g. 2026-04-07T07:30:00
updated_at: ""

# ── TASK ─────────────────────────────────────────────────────────────────────
task: >
  Plain English. What to do and what done looks like.
  Max 5 sentences. No markdown inside this field.

context_files: []       # list of repo-relative paths child should read first
                        # e.g. ["src/tools/first_principles_solver.py"]

result_path: ""         # where runner writes its output
                        # e.g. "logs/TASK-001-result.txt"

depends_on: []          # list of ticket_ids that must be closed first
                        # e.g. ["TASK-001", "TASK-002"]

# ── CONSTRAINTS ───────────────────────────────────────────────────────────
timeout_seconds: 120
decrement: 3            # attempts before status → escalated
depth: 0                # re-ticket depth (0 = first attempt)
max_tokens: null        # override token budget if needed; null = auto-derive

# ── TOOL MANIFEST ─────────────────────────────────────────────────────────
# Runner reads this section. These are the ONLY tools it may use.
allowed_tools:
  - read_file
  - write_file
  - exec_python
  - list_dir

# ── AUDIT ──────────────────────────────────────────────────────────────────
# attempts are written to logs/<ticket_id>-attempts.jsonl (JSONL, not here)
# one line per attempt:
# {"ts": "...", "attempt": 1, "outcome": "pass", "tokens": 0, "elapsed_s": 0.0, "finish": "stop"}
attempts_log: ""        # e.g. "logs/TASK-001-attempts.jsonl" (set by runner)
