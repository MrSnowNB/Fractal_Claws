task: >-
  Implement agent/child_agent.py — a minimal Python script that reads a ticket YAML
  from tickets/open/, executes the task described, writes the result to result_path,
  and moves the ticket to tickets/closed/ with status: closed. Use only read_file and
  write_file tools. No MCP, no pip installs, no browser.

context_files:
  - settings.yaml

result_path: logs/TASK-001-result.txt

max_tokens: 64
timeout_seconds: 90

allowed_tools:
  - name: read_file
    usage: read_file <path>
    description: Read a file and return its contents.
  - name: write_file
    usage: write_file <path> "<content>"
    description: Write content to a file at the given path.
