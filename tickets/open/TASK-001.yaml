# Task

Implement `agent/child_agent.py` — a minimal Python script that reads a ticket YAML from `tickets/open/`, executes the task described, writes the result to `result_path`, and moves the ticket to `tickets/closed/` with `status: closed`. Use only `read_file` and `write_file` tools. No MCP, no pip installs, no browser.

## What to do
1. Read the ticket YAML from `tickets/open/<ticket_id>.yaml`
2. Execute the `task` described in plain English using only the allowed tools
3. Write the result to the `result_path` specified in the ticket
4. Update the ticket status to `closed`
5. Move the ticket to `tickets/closed/<ticket_id>.yaml`

## What done looks like
- `agent/child_agent.py` exists and runs successfully
- A ticket in `tickets/open/` has been processed with status changed to `closed`
- The result has been written to the specified `result_path`
- The ticket file now exists in `tickets/closed/`

## Task Steps

1. Read the ticket YAML file from `tickets/open/`
2. Parse the ticket to extract:
   - `task`: description of what to do
   - `context_files`: files to read first
   - `result_path`: where to write the output
   - `allowed_tools`: list of tools the child can use
3. Read any files in `context_files` using `read_file` tool
4. Execute the `task` using only the allowed tools from `allowed_tools`
5. Write the final result to `result_path` using `write_file` tool
6. Update the ticket YAML:
   - Set `status: closed`
   - Add a new attempt entry to `attempts` array
   - Update `updated_at` timestamp
7. Move the ticket file from `tickets/open/` to `tickets/closed/`

## Tool Usage

- `read_file`: Read context files before executing the task
- `write_file`: Write the final result and update the ticket file

## Constraints

- Use only `read_file` and `write_file` tools
- No external dependencies
- No pip installs
- No MCP servers
- No browser access