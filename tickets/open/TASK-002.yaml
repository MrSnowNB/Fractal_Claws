ticket_id: TASK-002
title: Write and execute a Python script
status: open
created_at: "2026-04-06"
updated_at: "2026-04-06"

task: >-
  Write a Python script to output/hello.py that prints the following three lines:
    Line 1: Fractal Claws online
    Line 2: TASK-002 PASSED
    Line 3: the current date and time using datetime.now()
  Then execute output/hello.py and confirm it ran successfully.

context_files: []

result_path: logs/TASK-002-result.txt

max_tokens: 1024
timeout_seconds: 60

allowed_tools:
  - name: write_file
    usage: |
      TOOL: write_file
      PATH: <path>
      CONTENT:
      <content>
      END
    description: Write content to a file.
  - name: exec_python
    usage: |
      TOOL: exec_python
      PATH: <path>
      END
    description: Execute a Python file inside output/ and return stdout/stderr.
