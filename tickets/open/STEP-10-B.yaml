# Task definition
task: |
  Add a graphify_repo() method to the TicketIO class in src/ticket_io.py.

  This method should:
  - Accept a repo_path parameter (default "tickets/closed")
  - Return a graph dict with nodes, edges, and metadata
  - Use ContextBudget.file_hash() and ContextBudget.estimate_tokens() for hashing and token counting
  - Extract ticket relationships (parent/child) from the ticket data
  - Handle errors gracefully and log them

  The method should follow the same pattern as the existing graphify_repo() in ContextBudget (agent/context_budget.py, lines 215-281) but adapted to work with Ticket objects from TicketIO.load_ticket().

  Key differences from ContextBudget.graphify_repo():
  - Use TicketIO.load_ticket() to load tickets instead of raw YAML reading
  - Extract parent/child relationships from Ticket.children and Ticket.parent fields
  - Include Ticket-specific metadata like status, priority, created_at

  Return format:
  {
    "nodes": [
      {
        "id": ticket_id,
        "label": ticket_id,
        "type": "ticket",
        "file": path,
        "content_hash": sha256,
        "tokens": int,
        "status": str,
        "priority": str,
        "created_at": str
      },
      ...
    ],
    "edges": [
      {
        "from": parent_id,
        "to": child_id,
        "type": "parent_of" | "depends_on"
      },
      ...
    ],
    "metadata": {
      "source_dir": repo_path,
      "generated_at": ISO timestamp,
      "ticket_count": int,
      "errors": [optional list of error messages]
    }
  }

  Write the result to logs/STEP-10-B-graph.yaml using TicketIO.save_ticket() pattern
  (save as YAML, not as a dict).

  After implementation, run pytest tests/test_ticket_io.py to verify.
result_path: logs/STEP-10-B-graph.yaml
