ticket_id: TASK-003
title: Read a file, transform it, write the result
status: open
created_at: "2026-04-06"
updated_at: "2026-04-06"
depth: 0

task: >-
  Read the file output/hello.py.
  Write a new file output/hello_upper.py that is identical to output/hello.py
  except every string literal is uppercased.
  Then execute output/hello_upper.py and confirm it runs without errors.

context_files: []

result_path: logs/TASK-003-result.txt

max_tokens: 1024
timeout_seconds: 60

allowed_tools:
  - name: read_file
    usage: |
      TOOL: read_file
      PATH: <path>
      END
    description: Read a file and return its contents.
  - name: write_file
    usage: |
      TOOL: write_file
      PATH: <path>
      CONTENT:
      <content>
      END
    description: Write content to a file.
  - name: exec_python
    usage: |
      TOOL: exec_python
      PATH: <path>
      END
    description: Execute a Python file inside output/ and return stdout/stderr.
