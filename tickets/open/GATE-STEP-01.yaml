ticket_id: GATE-STEP-01
title: "Step 1 Validation Gate: test_ticket_io"
task: >
  STEP 1 OF 4 — READ THE SPEC
  Before doing anything else, read these files in order:
    1. AI-FIRST/STEP-01-TICKET-IO.md   ← source of truth for this gate
    2. src/ticket_io.py                ← implementation under test
    3. src/operator_v7.py              ← Ticket dataclass + enums
    4. tests/test_ticket_io.py         ← the 16-section test gate

  STEP 2 OF 4 — RUN THE GATE
  Execute: python output/run_gate_step1.py

  The script runs pytest against tests/test_ticket_io.py.
  All 16 test sections must pass (exit code 0).

  STEP 3 OF 4 — FIX FAILURES (if any)
  If any test fails:
    - The spec (AI-FIRST/STEP-01-TICKET-IO.md) is the source of truth.
    - Fix src/ticket_io.py to match the spec.
    - Do NOT weaken or skip tests.
    - Do NOT modify tests/test_ticket_io.py unless there is a genuine
      spec ambiguity, and document the change with a comment.
    - Re-run output/run_gate_step1.py after each fix.
    - Repeat until exit code 0.

  STEP 4 OF 4 — COMMIT AND SYNC
  Once all tests are green (exit code 0):
    - Stage all changed files:  git add -A
    - Commit with message:      git commit -m "gate: GATE-STEP-01 PASS — all ticket_io tests green"
    - Push to remote:           git push origin main
    - Confirm the push succeeded and report the commit SHA.
    - Mark this ticket closed.

rationale: >
  Validates the typed ticket I/O boundary (src/ticket_io.py) before any
  downstream code depends on it. This gate must be green before Step 2
  (tools/terminal.py + tools/registry.py) begins.
  Committing and pushing on pass lets the team monitor progress in real time
  via GitHub without needing terminal access.

produces:
  - stdout:pytest-step1-results
  - commit:gate-step-01-pass

consumes: []
