task: >
  Read AI-FIRST/STEP-04-TRAJECTORY.md in full.

  Write src/trajectory_extractor.py implementing exactly the following:

  1. Module-level constants:
     LOG_DIR    = "logs"
     SKILLS_DIR = "skills"
     CLOSED_DIR = "tickets/closed"

  2. Imports: os, re, glob, json, yaml, pathlib.Path

  3. Function extract_trajectory(ticket_id: str) -> dict | None
     - Reads logs/<ticket_id>-attempts.jsonl
     - Returns first record where outcome == "pass"
     - Returns None if file missing or no pass
     - Skips malformed JSON lines silently

  4. Function goal_class(ticket: dict) -> str
     - If ticket has tags list: join first 3 tags with "-", lowercase, spaces→dashes
     - Else: slugify ticket["title"] or ticket["ticket_id"]
     - Max length 48 chars
     - Returns a lowercase hyphenated string

  5. Function write_skill(goal_cls: str, trajectory: dict, ticket: dict) -> str
     - Creates skills/ dir if needed
     - Writes skills/<goal_cls>.yaml with these keys:
       goal_class, ticket_id, tags, tool_calls, tokens, elapsed_s, tok_s,
       finish, attempt, ts, produces, consumes
     - If file exists and existing elapsed_s <= new elapsed_s: skip (keep best)
     - Returns the path written

  6. Helper _load_ticket(path: str) -> dict
     - Handles single and multi-doc YAML (same as runner.py load_ticket)

  7. Function run_extraction(closed_dir: str = CLOSED_DIR) -> list[str]
     - Globs tickets/closed/*.yaml (or closed_dir)
     - For each ticket: extract_trajectory, goal_class, write_skill
     - Skips tickets with no pass trajectory
     - Returns list of skill paths written
     - Prints "[trajectory] <ticket_id> → <path>" for each

  8. CLI entrypoint:
     if __name__ == "__main__":
         paths = run_extraction()
         print(f"[trajectory] extracted {len(paths)} skill(s)")
         for p in paths:
             print(f"  {p}")

  Write the completed module to src/trajectory_extractor.py.
  Do not truncate or summarize — write the full implementation.
rationale: >
  Core self-improvement loop. Winning toolpaths are compressed into skill YAML
  files so Cline can skip re-decomposition of known-good goal classes.
produces: [src/trajectory_extractor.py]
consumes: [logs/*-attempts.jsonl, tickets/closed/*.yaml]
