task: |
  Read agent/context_budget.py. Write scratch first.

  Add the following to context_budget.py:

  1. Module-level constant ZONE_PATH_RULES (place near top, after imports):

    ZONE_PATH_RULES = [
        ("AI-FIRST/",    "docs_cache"),
        (".clinerules/", "docs_cache"),
        ("tickets/",     "ticket_context"),
        ("logs/",        "scratch_pad"),
        ("src/",         "docs_cache"),
        ("tests/",       "docs_cache"),
        ("agent/",       "docs_cache"),
    ]

  2. Method on ContextBudget:

    def graphify_repo(self, root: str = ".", zones: dict | None = None) -> dict:
        """Pre-scan repo, hash every tracked file, pre-populate cache.

        Walks all .py, .md, .yaml files under root.
        Skips: __pycache__, .git, any dir starting with '.'.
        Assigns zone by first matching prefix in ZONE_PATH_RULES.
        Unmatched files default to docs_cache.
        Pre-populates _file_hashes and _file_tokens.
        Calls _save_cache() at the end.

        Returns:
            {"files_scanned": int, "tokens_estimated": int, "zone_summary": {zone: count}}
        """

  RULES:
  - Use pathlib.Path.rglob() for the walk.
  - Skip dirs named __pycache__, .git, or starting with '.'.
  - First matching rule in ZONE_PATH_RULES wins. Compute relative path from root for matching.
  - Call self._save_cache() at end.
  - Do not touch any other method.

rationale: |
  ContextBudget currently accumulates hashes passively as files are read.
  graphify_repo() makes it an active pre-scan: run once at SESSION_START,
  pre-populate the cache so should_read() returns (False, "cached") for
  every unchanged file from the very first call of the session.
  Eliminates Luffy re-reading specs she already knows.

