rationale: >
  This is the data-generation stage of the harness integration test. It produces
  the primary artifact (word frequency table) that all downstream tasks depend on.
  It directly tests write_file + exec_python tool chaining, the output/ sandbox
  enforcement, and budget floor behavior on a moderately complex script.

task: >
  Write a Python script to output/word_freq.py that defines a short seed corpus
  as a multiline string (use exactly this text: "the quick brown fox jumps over
  the lazy dog the fox and the dog sat by the fire the end"), tokenizes it by
  splitting on whitespace, counts word frequencies using a dict, then prints
  each word and its count sorted by frequency descending in the format
  "word: N" one per line. After writing the file, execute it using exec_python
  with PATH output/word_freq.py. The script must run with returncode 0 and
  stdout must contain the line "the: 5" as the highest-frequency word.
  Both write_file and exec_python paths must be output/word_freq.py.
