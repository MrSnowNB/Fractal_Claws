# Fractal Claws - Model Configuration
# Harness: Cline (Qwen3-Coder-Next-GGUF, ~80B) as parent orchestrator
#          runner.py (Qwen3.5-35B-A3B-GGUF) as child executor
# Hardware: HP ZBook (single node)
# Endpoint: Lemonade at localhost:8000
#
# 4B MODEL STATUS: DEPRECATED — deferred to future integration phase.
# Do NOT reference Qwen3.5-4B-GGUF anywhere in active code or docs.
#
# Budget policy:
#   max_tokens        = output token CAP (server-enforced hard limit)
#                       NOTE: runner.py computes dynamic budgets at runtime via
#                       token_budget(); this field is documentation-only and is
#                       NOT passed to the OpenAI client directly.
#   decompose_budget  = INPUT context tokens reserved for the decompose phase
#                       (i.e. how much of the context window the decompose prompt
#                       may consume). This is NOT an output token request.
#   output_budget_pct = fraction of context_window used as BUDGET_CEILING in runner
#   All three must be consistent: decompose_budget <= context_window * output_budget_pct

model:
  id: Qwen3.5-35B-A3B-GGUF        # child executor (A3B MoE, ctx_size: 64000)
  endpoint: http://localhost:8000/api/v1
  format: openai-compat
  api_key: x
  temperature: 0.2
  max_tokens: 512                  # output token hard CAP (doc-only — runner uses dynamic budget)
  decompose_budget: 51200          # 80% of 64000 — INPUT context reserved for decompose phase
  output_budget_pct: 0.8           # 80% of context_window = BUDGET_CEILING in runner
  context_window: 64000            # A3B actual context window
  timeout_seconds: 180
  max_retries: 2
  stream: false
  allowed_tools:
    - shell
    - read_file
    - write_file
    - list_dir
  forbidden_tools:
    - browser
    - web_fetch
    - computer_use
    - code_interpreter

tickets:
  open_dir: tickets/open
  in_progress_dir: tickets/in_progress
  closed_dir: tickets/closed
  failed_dir: tickets/failed
  template: tickets/template.yaml
  max_open: 5
  decrement_default: 3

validation:
  unit: "pytest -q tests/"
  lint: "ruff check src/"
  type: "mypy src/"
  docs: "python tools/spec_check.py"

logging:
  dir: logs/
  pattern: "logs/session_{date}.jsonl"
  gitignore: true
