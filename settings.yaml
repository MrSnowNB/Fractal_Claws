# Fractal Claws - 4B POC
# Hardware: HP ZBook (single node)
# Endpoint: Lemonade at localhost:8000

model:
  id: Qwen3.5-4B-GGUF
  endpoint: http://localhost:8000/api/v1
  format: openai-compat
  api_key: x
  temperature: 0.2
  max_tokens: 1024             # output token budget (not context window)
  decompose_budget: 6553       # input token budget for decompose (8192 * 0.8)
  context_window: 8192
  timeout_seconds: 120         # bumped — decompose prompts need more time
  max_retries: 3
  stream: false
  perf:
    gen_tok_per_sec: 40.9
    ttft_s: 0.96
    ram_used_gb: 27.0
  allowed_tools:
    - shell
    - read_file
    - write_file
    - list_dir
  forbidden_tools:
    - browser
    - web_fetch
    - computer_use
    - code_interpreter

tickets:
  open_dir: tickets/open
  in_progress_dir: tickets/in_progress
  closed_dir: tickets/closed
  template: tickets/template.yaml
  max_open: 5
  decrement_default: 3

validation:
  unit: "pytest -q tests/"
  lint: "ruff check src/"
  type: "mypy src/"
  docs: "python tools/spec_check.py"

logging:
  dir: logs/
  pattern: "logs/session_{date}.jsonl"
  gitignore: true
