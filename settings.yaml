# Fractal Claws - Model Configuration
# Harness: Cline (Qwen3-Coder-Next-GGUF, ~80B) as parent orchestrator
#          runner.py (Qwen3.5-35B-A3B-GGUF) as child executor
# Hardware: HP ZBook (single node)
# Endpoint: Lemonade at localhost:8000
#
# 4B MODEL STATUS: DEPRECATED — deferred to future integration phase.
# Do NOT reference Qwen3.5-4B-GGUF anywhere in active code or docs.
#
# Budget policy (v4 — thinking-model aware):
#   BUDGET_FLOOR      = 1024 tokens  (minimum for thinking + tool block)
#   BUDGET_CEILING    = context_window * output_budget_pct  (80% = 51200)
#   token_budget()    = dynamic per-ticket, bounded by floor/ceiling
#   max_tokens        = hard output CAP for runaway prevention (doc-only at runtime)
#   decompose_budget  = output tokens reserved for decompose phase YAML generation
#                       (NOT input context — this is the max_tokens for that call)
#   output_budget_pct = fraction of context_window used as BUDGET_CEILING in runner
#
# Thinking-model note:
#   Qwen3.5-35B-A3B uses chain-of-thought tokens before producing output.
#   A typical reasoning pass consumes 300-600 tokens before the first TOOL: line.
#   BUDGET_FLOOR=1024 ensures thinking + write_file + exec_python fits in one call.
#   For multi-tool tickets (write + exec + verify), budget will scale to 2048+.

model:
  id: Qwen3.5-35B-A3B-GGUF        # child executor (A3B MoE, ctx_size: 64000)
  endpoint: http://localhost:8000/api/v1
  format: openai-compat
  api_key: x
  temperature: 0.2
  max_tokens: 4096                 # hard output CAP — runaway guard (doc-only; runner uses dynamic budget)
  decompose_budget: 2048           # output tokens for decompose YAML generation (not input context)
  output_budget_pct: 0.8           # 80% of context_window = BUDGET_CEILING (51200 tokens)
  context_window: 64000            # A3B actual context window
  timeout_seconds: 180
  max_retries: 2
  stream: false
  allowed_tools:
    - shell
    - read_file
    - write_file
    - list_dir
    - exec_python
  forbidden_tools:
    - browser
    - web_fetch
    - computer_use
    - code_interpreter

agent:
  stage: bud     # bud | branch | planted | rooted | rook

tickets:
  open_dir: tickets/open
  in_progress_dir: tickets/in_progress
  closed_dir: tickets/closed
  failed_dir: tickets/failed
  template: tickets/template.yaml
  max_open: 5
  max_retries_default: 2
  decrement_default: 3

validation:
  unit: "pytest -q tests/"
  lint: "ruff check src/"
  type: "mypy src/"
  docs: "python tools/spec_check.py"

logging:
  dir: logs/
  pattern: "logs/session_{date}.jsonl"
  gitignore: true
  max_logs: 100          # FIFO eviction ceiling — max -attempts.jsonl files on disk
  min_retain: 10         # always keep at least N most-recent logs regardless of count
  keep_escalated: true   # tickets in tickets/failed/ are never evicted

# Context budget — 64K window management (graphify-inspired SHA256 cache)
# Prevents Luffy from re-reading docs already in context.
context:
  ctx_limit: 65536
  cache_path: logs/ctx-cache.json
  zones:
    system_prompt: 4096     # reserved for system prompt (not tracked)
    docs_cache: 20480       # AI-FIRST specs, AGENT-PERSONA, etc.
    ticket_context: 20480   # active ticket + context_files
    scratch_pad: 12288      # reasoning, tool output
    response: 8192          # model output buffer

# Sequence gate — enforces journal + commit after every completed step.
# Luffy MUST journal and commit before starting the next sequence.
sequence:
  enforce_journal: true
  enforce_commit: true
  agent_id: luffy-v1
