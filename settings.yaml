---
# Fractal Claws — 4B POC Config
# Single model. Single endpoint. Frozen.

model:
  id: Qwen3.5-4B-GGUF
  endpoint: http://localhost:11434/v1
  format: openai-compat
  temperature: 0.2
  max_tokens: 512
  context_window: 8192
  timeout_seconds: 90
  max_retries: 2
  stream: false

  allowed_tools:
    - shell        # parent only
    - read_file
    - write_file
    - list_dir

  forbidden_tools:
    - browser
    - web_fetch
    - computer_use
    - code_interpreter

tickets:
  open_dir: tickets/open
  in_progress_dir: tickets/in_progress
  closed_dir: tickets/closed
  template: tickets/template.yaml
  max_open: 5
  decrement_default: 3

validation:
  unit:  "pytest -q tests/"
  lint:  "ruff check src/"
  type:  "mypy src/"
  docs:  "python tools/spec_check.py"

logging:
  dir: logs/
  pattern: "logs/session_{date}.jsonl"
  gitignore: true  # logs never committed
